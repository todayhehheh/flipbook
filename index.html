<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꿈드림 플립북 서비스</title>

    <link href="dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333333; /* 배경색을 어둡게 하면 플립북이 더 돋보입니다 */
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="_df_book" id="kkumdream_pdf"></div>
    </div>

    <script src="dflip/js/libs/jquery.min.js" type="text/javascript"></script>
    <script src="dflip/js/dflip.min.js" type="text/javascript"></script>

    <script type="text/javascript">
        // 중요: HTML의 id가 'kkumdream_pdf'이므로 변수명은 반드시 'option_kkumdream_pdf'여야 작동합니다.
        var option_kkumdream_pdf = {
            // 여기에 로컬에 있는 PDF 파일 이름을 적어줍니다.
            // 예: index.html과 같은 폴더에 'document.pdf'가 있다면 아래처럼 작성합니다.
            source: 'document.pdf',
            webgl: true // 3D 넘김 효과 켜기
        };
    </script>

</body>
</html>
